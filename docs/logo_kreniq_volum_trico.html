<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kreniq - Red de Transiciones 3D</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            overflow: hidden;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            color: #ffffff;
            cursor: grab; 
        }

        body:active {
            cursor: grabbing;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#000000'); 
        scene.fog = new THREE.FogExp2('#000000', 0.008);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 80);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping; 
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.04;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.84;
        controls.enablePan = false;
        controls.minDistance = 30;
        controls.maxDistance = 150;

        const matrixGroup = new THREE.Group();
        scene.add(matrixGroup);

        const COLOR_NODE_GOLD = 0xF5A623;   
        const COLOR_NODE_ORANGE = 0xFF5722; 
        const COLOR_EDGE_CYAN = 0x00E5FF;   
        const COLOR_EDGE_MAGENTA = 0xE61062; 
        
        const RADIUS = 25; 
        const TOTAL_NODES = 36; 

        const nodes = [];
        const phi = Math.PI * (3 - Math.sqrt(5)); 

        for (let i = 0; i < TOTAL_NODES; i++) {
            const y = 1 - (i / (TOTAL_NODES - 1)) * 2; 
            const radiusAtY = Math.sqrt(1 - y * y); 
            const theta = phi * i; 

            const x = Math.cos(theta) * radiusAtY;
            const z = Math.sin(theta) * radiusAtY;

            const pos = new THREE.Vector3(x * RADIUS, y * RADIUS, z * RADIUS);
            
            let weight = Math.random();
            let isAttractor = weight > 0.85;
            // Se redujo el tamaño máximo de los nodos atractores a la mitad aprox
            let nodeSize = isAttractor ? (Math.random() * 0.8 + 1.0) : (Math.random() * 0.5 + 0.3);

            nodes.push({ pos, isAttractor, size: nodeSize, id: i });
        }

        const nodeMatStandard = new THREE.MeshBasicMaterial({ color: COLOR_NODE_GOLD });
        const nodeMatAttractor = new THREE.MeshBasicMaterial({ color: COLOR_NODE_ORANGE });
        
        nodes.forEach(node => {
            const group = new THREE.Group();
            group.position.copy(node.pos);

            const coreMaterial = node.isAttractor ? nodeMatAttractor : nodeMatStandard;
            const core = new THREE.Mesh(new THREE.SphereGeometry(node.size, 16, 16), coreMaterial);
            
            group.add(core);
            matrixGroup.add(group);
        });

        const thickCyanMat = new THREE.MeshBasicMaterial({ color: COLOR_EDGE_CYAN, transparent: true, opacity: 0.8 });
        const thickMagentaMat = new THREE.MeshBasicMaterial({ color: COLOR_EDGE_MAGENTA, transparent: true, opacity: 0.9 });
        const thinCyanMat = new THREE.LineBasicMaterial({ color: COLOR_EDGE_CYAN, transparent: true, opacity: 0.25 });

        function createTransitionEdge(nodeA, nodeB, type) {
            const midPoint = new THREE.Vector3().addVectors(nodeA.pos, nodeB.pos).multiplyScalar(0.5);
            midPoint.multiplyScalar(0.3); 

            const curve = new THREE.QuadraticBezierCurve3(nodeA.pos, midPoint, nodeB.pos);

            if (type === 'thick_cyan' || type === 'magenta') {
                const tubeGeo = new THREE.TubeGeometry(curve, 32, type === 'magenta' ? 0.4 : 0.25, 6, false);
                const mat = type === 'magenta' ? thickMagentaMat : thickCyanMat;
                const mesh = new THREE.Mesh(tubeGeo, mat);
                matrixGroup.add(mesh);
            } else {
                const points = curve.getPoints(20);
                const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
                const line = new THREE.Line(lineGeo, thinCyanMat);
                matrixGroup.add(line);
            }
        }

        const attractors = nodes.filter(n => n.isAttractor);
        
        for (let i = 0; i < attractors.length; i++) {
            for (let j = i + 1; j < attractors.length; j++) {
                if (Math.random() > 0.3) { 
                    createTransitionEdge(attractors[i], attractors[j], 'thick_cyan');
                }
            }
        }

        const magentaLoopLength = 8; 
        const magentaLoopNodes = [];
        
        for (let i = 0; i < magentaLoopLength; i++) {
            magentaLoopNodes.push(nodes[Math.floor(Math.random() * nodes.length)]);
        }
        
        for (let i = 0; i < magentaLoopLength; i++) {
            let nA = magentaLoopNodes[i];
            let nB = magentaLoopNodes[(i + 1) % magentaLoopLength];
            if (nA !== nB) {
                createTransitionEdge(nA, nB, 'magenta');
            }
        }

        for (let i = 0; i < TOTAL_NODES; i++) {
            let connections = Math.floor(Math.random() * 3) + 2;
            for (let c = 0; c < connections; c++) {
                let target = nodes[Math.floor(Math.random() * nodes.length)];
                if (nodes[i] !== target) {
                    createTransitionEdge(nodes[i], target, 'thin');
                }
            }
        }

        const shellGeometry = new THREE.SphereGeometry(RADIUS, 24, 24);
        const shellMaterial = new THREE.MeshBasicMaterial({
            color: 0x444C56,
            transparent: true,
            opacity: 0.03,
            wireframe: true
        });
        const shellMesh = new THREE.Mesh(shellGeometry, shellMaterial);
        matrixGroup.add(shellMesh);

        window.addEventListener('resize', onWindowResize, false);

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            matrixGroup.position.y = Math.sin(Date.now() * 0.001) * 1.5;
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
