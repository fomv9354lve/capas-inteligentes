# Tier 3 — OpenSSF Scorecard: an INDEPENDENT supply-chain security score for the open core.
# Publishes to the public OpenSSF dashboard so the badge reflects a third party's assessment, not ours.
name: OpenSSF Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '0 6 * * 1'
  push:
    branches: [ main ]
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true   # publishes to the public OpenSSF API (enables the badge)

      - name: Upload SARIF
        uses: actions/upload-artifact@v4
        with:
          name: SARIF-results
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
