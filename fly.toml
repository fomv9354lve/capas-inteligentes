app = "capas-engine"
primary_region = "qro"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "7860"

[http_service]
  internal_port = 7860
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
