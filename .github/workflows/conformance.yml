# Tier 1 — run the CAPAS conformance suite on NEUTRAL infra and SIGN the result (Sigstore, keyless).
# This turns "passes on my laptop" into "the suite is green on GitHub's runners, and the result is
# cryptographically attested in a public transparency log." Anyone can verify the signature.
name: CAPAS Conformance

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for keyless Sigstore signing (OIDC)

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run the conformance suite (run-it-yourself; same suite the certifier runs)
        run: python benchmarks/conformance.py --json

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3

      - name: Sign the conformance result (keyless — Sigstore / Rekor transparency log)
        run: |
          cosign sign-blob --yes outputs/conformance_result.json \
            --output-signature outputs/conformance_result.sig \
            --output-certificate outputs/conformance_result.pem

      - name: Upload the signed conformance attestation
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: capas-conformance-attestation
          path: |
            outputs/conformance_result.json
            outputs/conformance_result.sig
            outputs/conformance_result.pem
