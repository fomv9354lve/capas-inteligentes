# Developer Certificate of Origin (DCO) check — OpenSSF LE-01.01 (contribution provenance).
# Verifies every commit in the PR carries a `Signed-off-by:` trailer. This is a real, minimal grep
# over the PR's commit range (no third-party action — fully auditable and SHA-pinning-free by design).
name: DCO

on:
  pull_request:

permissions:
  contents: read

jobs:
  dco-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for the PR range)
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0

      - name: Verify Signed-off-by on every PR commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          range="${BASE_SHA}..${HEAD_SHA}"
          echo "Checking DCO sign-off for commits in ${range}"
          commits=$(git rev-list "${range}")
          if [ -z "${commits}" ]; then
            echo "No commits in range — nothing to check."
            exit 0
          fi
          fail=0
          for sha in ${commits}; do
            # Skip merge commits (two-or-more parents): they carry no authored change to certify.
            parents=$(git rev-list --parents -n 1 "${sha}" | wc -w)
            if [ "${parents}" -gt 2 ]; then
              echo "skip (merge)   ${sha}"
              continue
            fi
            author="$(git show -s --format='%an <%ae>' "${sha}")"
            subject="$(git show -s --format='%s' "${sha}")"
            # A valid sign-off is a trailer line: "Signed-off-by: Name <email>"
            if git show -s --format='%B' "${sha}" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "ok             ${sha}  ${subject}"
            else
              echo "MISSING DCO    ${sha}  ${subject}  (author: ${author})"
              fail=1
            fi
          done
          if [ "${fail}" -ne 0 ]; then
            echo ""
            echo "::error::One or more commits are missing a 'Signed-off-by' line."
            echo "Fix with:  git commit --amend --signoff   (or)   git rebase --signoff ${BASE_SHA}"
            exit 1
          fi
          echo "All PR commits are signed off (DCO satisfied)."
