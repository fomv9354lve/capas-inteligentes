name: CAPAS CI

on:
  push:
  pull_request:
  workflow_dispatch:

# Least-privilege token (OpenSSF Scorecard: Token-Permissions).
permissions:
  contents: read

jobs:
  product-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip setuptools wheel build

      - name: Install package
        run: python -m pip install -e .

      - name: Product demo acceptance
        run: python benchmarks/verify_capas_product_demo.py

      - name: Fresh clone install smoke
        run: python benchmarks/verify_fresh_clone_install.py

      - name: External input schema
        run: python benchmarks/verify_external_input_schema.py

      - name: Claim gate UI
        run: python benchmarks/verify_claim_gate_ui.py

      - name: External user validation packet
        run: python benchmarks/verify_external_user_validation.py

      # Load-bearing invariants on neutral CI (deterministic, no browser / gh / release deps).
      - name: Conformance suite
        run: python benchmarks/conformance.py

      # Locks the gate's correctness on the two failure modes the pedagogy sprint flagged
      # (non-GIGO false-admit + over-block): a real regression fails CI. GIGO ceiling is out of scope.
      - name: Gate correctness (no false-admit / no over-block)
        run: python benchmarks/verify_gate_no_false_admit.py

      # Exercises the shipped engine across all 12 claim types + the verify/audit surface
      # (raises real coverage of the load-bearing decision paths).
      - name: Engine surface (12 claim types + verify)
        run: python benchmarks/test_engine_surface.py

      # OpenSSF Best Practices — warnings: treated as errors (verified clean on the conformance suite).
      - name: Warnings as errors
        run: python -W error benchmarks/conformance.py

      # OpenSSF Best Practices — dynamic_analysis: property-based fuzzing. The gate must fail-closed and
      # never crash on any generated input (generalizes verify_robustness.py via Hypothesis).
      - name: Dynamic analysis (Hypothesis fuzz)
        run: |
          python -m pip install hypothesis
          python benchmarks/test_dynamic_fuzz.py

      # OpenSSF Best Practices — static_analysis: Python security linter (reporting; CodeQL semantic
      # analysis runs in codeql.yml). --exit-zero keeps it non-blocking until findings are triaged.
      - name: Static analysis (Bandit)
        run: |
          python -m pip install bandit
          bandit -r . -ll --exit-zero -x ./outputs,./.pixi,./designlab/vendor,./docs/vendor,./build

      # OpenSSF Best Practices (Silver) — coding_standards_enforced: Ruff lint. ENFORCING on the
      # real-error subset (E9/F63/F7/F82 per pyproject); the broader style sweep is reported, non-blocking.
      - name: Lint (Ruff)
        run: |
          python -m pip install ruff
          ruff check .                                 # enforcing: fails on real errors
          ruff check . --select=ALL --exit-zero --statistics   # full style report (non-blocking)

      - name: Entry point smoke test
        run: capas inspect trace_039

      # OpenSSF Best Practices — test coverage: run the conformance suite under coverage and PRINT the
      # real measured statement %. Non-blocking (no threshold gate). The suite runs each invariant check
      # as a subprocess, so we enable subprocess coverage via COVERAGE_PROCESS_START + a process_startup
      # hook on PYTHONPATH, then combine. We report the honest number; we do not gate on it.
      - name: Coverage (measured, non-blocking)
        continue-on-error: true
        run: |
          python -m pip install coverage
          mkdir -p .covhook
          cat > .covhook/sitecustomize.py <<'PY'
          import coverage
          coverage.process_startup()
          PY
          cat > .coveragerc <<'CFG'
          [run]
          parallel = true
          source = .
          omit =
              benchmarks/*
              outputs/*
              designlab/*
              build/*
              dist/*
              .pixi/*
              docs/*
              tests/*
              examples/*
              setup.py
          CFG
          rm -f .coverage .coverage.* || true
          COVERAGE_PROCESS_START="$PWD/.coveragerc" \
          PYTHONPATH="$PWD/.covhook:$PYTHONPATH" \
          python -m coverage run --rcfile=.coveragerc benchmarks/conformance.py
          python -m coverage combine --rcfile=.coveragerc || true
          echo "=== CAPAS measured statement coverage (conformance suite, non-blocking) ==="
          python -m coverage report --rcfile=.coveragerc

      # OpenSSF Best Practices — SCA (Software Composition Analysis): scan installed deps for known
      # vulnerabilities. Reporting-only (|| true) so a transitive advisory does not red-flag every push.
      - name: Dependency audit (pip-audit, reporting)
        continue-on-error: true
        run: |
          python -m pip install pip-audit
          pip-audit || true

      # NOTE: "External MVP readiness packets" (verify_external_mvp_readiness.py — asserts gh-auth +
      # release tags) and the full "Product validators" (`capas validate` — browser E2E + env-sensitive)
      # were removed from per-push CI: they assume a local/release environment that a runner does not
      # have and flaked red on every commit (the email flood). Release readiness belongs in a release
      # workflow; the validate invariants are covered by the conformance suite above. Run them locally:
      # `python capas.py validate`.
