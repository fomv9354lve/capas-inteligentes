[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "capas-claim-gate"
version = "0.1.0"
description = "Evidence-typed claim gate for scientific computation traces"
readme = "README.md"
requires-python = ">=3.11"
authors = [
  { name = "CAPAS project" }
]
license = "LicenseRef-Proprietary-Research-Prototype"
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "Programming Language :: Python :: 3",
  "Topic :: Scientific/Engineering",
]
dependencies = [
  "numpy",
]

[project.optional-dependencies]
corpus = [
  "scipy",
  "pyscf",
  "quimb",
  "cotengra",
  "stim",
  "rocrate==0.15.0",
  "rocrateValidator==0.2.15",
]
validation = [
  "rocrate==0.15.0",
  "rocrateValidator==0.2.15",
]

[project.scripts]
capas = "capas:main"

[tool.setuptools]
py-modules = ["capas"]
packages = ["router", "router.backends", "integrations"]
