<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">CAPAS Claim Gate</title>
  <desc id="desc">Deterministic evidence gates for structured scientific claims.</desc>
  <rect width="1200" height="630" fill="#09090b"/>
  <rect x="80" y="80" width="1040" height="470" rx="32" fill="#111113" stroke="#27272a" stroke-width="2"/>
  <rect x="120" y="122" width="88" height="88" rx="22" fill="#7c7fff"/>
  <text x="164" y="178" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="38" font-weight="800" fill="#ffffff">CG</text>
  <text x="120" y="285" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="72" font-weight="800" fill="#fafafa">CAPAS Claim Gate</text>
  <text x="120" y="350" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="30" font-weight="500" fill="#a1a1aa">ACCEPT / REJECT / REWRITE / HOLD for structured scientific claims</text>
  <g font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="24" font-weight="700">
    <rect x="120" y="420" width="136" height="48" rx="24" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.35)"/>
    <text x="188" y="452" text-anchor="middle" fill="#22c55e">ACCEPT</text>
    <rect x="276" y="420" width="128" height="48" rx="24" fill="rgba(249,115,22,0.12)" stroke="rgba(249,115,22,0.35)"/>
    <text x="340" y="452" text-anchor="middle" fill="#f97316">REWRITE</text>
    <rect x="424" y="420" width="112" height="48" rx="24" fill="rgba(239,68,68,0.12)" stroke="rgba(239,68,68,0.35)"/>
    <text x="480" y="452" text-anchor="middle" fill="#ef4444">REJECT</text>
    <rect x="556" y="420" width="88" height="48" rx="24" fill="rgba(148,163,184,0.12)" stroke="rgba(148,163,184,0.3)"/>
    <text x="600" y="452" text-anchor="middle" fill="#94a3b8">HOLD</text>
  </g>
  <text x="120" y="510" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="22" fill="#8d8d99">Rule-based. No LLM at decision time. Schema errors surface as HOLD.</text>
</svg>
