# Tier 2 — publish the wheel to PyPI via Trusted Publishing (OIDC). NO token in the repo.
# Your turn (one-time): on pypi.org, add a Trusted Publisher for this repo + workflow, then cut a
# GitHub Release. After that `pip install capas-claim-gate` is real and the SCOPED pip claim upgrades.
name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # Trusted Publishing — no API token needed
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.11"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          # PEP 740 / SLSA-aligned provenance attestations, signed via OIDC + Sigstore.
          attestations: true
