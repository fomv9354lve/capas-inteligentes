name: CAPAS Claim Gate Action

on:
  workflow_dispatch:

# Least-privilege token (OpenSSF Scorecard: Token-Permissions).
permissions:
  contents: read

jobs:
  claim-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
      - uses: ./.github/actions/capas-claim-gate
        with:
          mode: batch
          input: examples/external_claim_batch.json
          output: outputs/capas-action-report.json
      - name: Upload CAPAS report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: capas-claim-gate-report
          path: outputs/capas-action-report.json
