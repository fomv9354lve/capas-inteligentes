name: CAPAS Claim Gate
description: Run CAPAS deterministic claim gates in GitHub Actions.
inputs:
  mode:
    description: "Operation to run: decide, batch, or pipeline."
    required: false
    default: batch
  input:
    description: Path to the claim/evidence JSON input.
    required: true
  output:
    description: Path to write the CAPAS JSON report.
    required: false
    default: outputs/capas-action-report.json
  allow_web:
    description: Allow web retrieval for pipeline mode.
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - name: Run CAPAS gate
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "$(dirname "${{ inputs.output }}")"
        if [[ "${{ inputs.mode }}" == "decide" ]]; then
          python3 capas.py decide --input "${{ inputs.input }}" --output "${{ inputs.output }}"
        elif [[ "${{ inputs.mode }}" == "batch" ]]; then
          python3 capas.py batch --input "${{ inputs.input }}" --output "${{ inputs.output }}"
        elif [[ "${{ inputs.mode }}" == "pipeline" ]]; then
          if [[ "${{ inputs.allow_web }}" == "true" ]]; then
            python3 capas.py pipeline --input "${{ inputs.input }}" --output "${{ inputs.output }}" --allow-web
          else
            python3 capas.py pipeline --input "${{ inputs.input }}" --output "${{ inputs.output }}"
          fi
        else
          echo "Unsupported CAPAS mode: ${{ inputs.mode }}" >&2
          exit 2
        fi
