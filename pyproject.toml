[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "capas-claim-gate"
version = "0.2.0"
description = "A fail-closed verification layer you wrap around your LLM: it never lets an unsupported claim through as ACCEPT, re-derives what is re-derivable, and emits a deterministic verifiable reward."
readme = "README.md"
requires-python = ">=3.11"
authors = [
  { name = "CAPAS project" }
]
license = "LicenseRef-Proprietary-Research-Prototype"
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "Programming Language :: Python :: 3",
  "Topic :: Scientific/Engineering",
]
dependencies = [
  "numpy",
]

[project.optional-dependencies]
corpus = [
  "scipy",
  "pyscf",
  "quimb",
  "cotengra",
  "stim",
  "rocrate==0.15.0",
  "rocrateValidator==0.2.15",
]
validation = [
  "rocrate==0.15.0",
  "rocrateValidator==0.2.15",
]
standalone = [
  "pypdf>=4",
]

[project.scripts]
capas = "capas:main"

[tool.setuptools]
py-modules = [
  "capas", "capas_sdk",
  "capas_admissibility", "capas_audit", "capas_braid", "capas_bridge", "capas_circuits",
  "capas_conformal", "capas_conjecture", "capas_consilience", "capas_discovery", "capas_extract",
  "capas_ezkl", "capas_falsify", "capas_hierarchy", "capas_intake", "capas_integration",
  "capas_loop", "capas_mind", "capas_process", "capas_propose", "capas_quantum", "capas_rcc",
  "capas_registry", "capas_route", "capas_sequential", "capas_sql", "capas_think", "capas_value",
  "capas_verify", "capas_xbrl",
]
packages = ["router", "router.backends", "integrations"]
